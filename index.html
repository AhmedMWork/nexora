<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA | Coming Tuesday</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<div class="container">
    <img src="logo.png" class="logo">

    <div class="eyebrow">EXCLUSIVE DROP • TUESDAY</div>

    <h1>NOT FOR EVERYONE.</h1>

    <p class="sub">
        The first NEXORA drop arrives soon.
    </p>

    <div class="countdown">
        <div class="card"><span id="days">00</span><small>DAYS</small></div>
        <div class="card"><span id="hours">00</span><small>HOURS</small></div>
        <div class="card"><span id="minutes">00</span><small>MINUTES</small></div>
        <div class="card"><span id="seconds">00</span><small>SECONDS</small></div>
    </div>

    <div class="status">
        ● LIVE COUNTDOWN TO NEXT DROP
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
